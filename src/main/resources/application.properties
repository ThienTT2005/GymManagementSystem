spring.application.name=GymManagementSystem
# -----------------------------------------
# CẤU HÌNH KẾT NỐI DATABASE (Phần việc của bạn)
# -----------------------------------------
# 1. Địa chỉ kết nối đến MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/GymManagement?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# Mật khẩu bạn đã đặt (Ví dụ: 123456)
spring.datasource.password=123456

# 2. Cấu hình Hibernate
# 'update' giúp tự động tạo bảng từ các file .java bạn sắp viết
spring.jpa.hibernate.ddl-auto=update
# Hiện câu lệnh SQL ở bảng Console để bạn kiểm tra (Test query CRUD)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect